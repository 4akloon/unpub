name: unpub_web
description: Unpub web UI built with Jaspr.
version: 2.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.21.0
  jaspr_router: ^0.7.3
  http: ^1.2.2
  markdown: ^7.2.2
  intl: ^0.19.0
  path: ^1.9.1
  shelf: ^1.4.2
  shelf_static: ^1.1.3
  unpub_api: any

dev_dependencies:
  build_runner: ^2.4.0
  build_web_compilers: ^4.0.0
  jaspr_builder: ^0.21.0

jaspr:
  mode: server
