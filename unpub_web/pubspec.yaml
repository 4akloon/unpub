name: unpub_web
description: Unpub web UI built with Jaspr.
version: 2.0.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.23.1
  jaspr_router: ^0.8.2
  jaspr_riverpod: ^0.4.5
  http: ^1.2.2
  markdown: ^7.2.2
  intl: ^0.20.2
  path: ^1.9.1
  shelf: ^1.4.2
  unpub_api: any
  universal_web: any
  mongo_dart: ^0.10.8
  unpub: ^2.0.1-dev.0
  args: ^2.7.0

dev_dependencies:
  build_runner: ^2.4.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1
  jaspr_cli: ^0.23.1

jaspr:
  mode: server
