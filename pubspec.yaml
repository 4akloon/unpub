name: unpub_workspace
publish_to: none

environment:
  sdk: ^3.10.0

workspace:
  - unpub_api
  - unpub
  - unpub_web
  - unpub_aws
  - unpub_auth

dev_dependencies:
  lints: ^6.1.0

dependency_overrides:
